global:
  scrape_interval: 15s

scrape_configs:
  - job_name: synapse-backend
    metrics_path: /metrics
    static_configs:
      # host.docker.internal reaches the uvicorn process on the Windows host
      - targets: ["host.docker.internal:8000"]
  - job_name: synapse-backend-container
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
